    <style>
      :root {
        --ink: #221a17;
        --muted: #75675e;
        --paper: #fbf7ef;
        --vellum: #f2eadc;
        --gold: #b88a44;
        --gold-soft: #e6d1a5;
        --wine: #5c1f2d;
        --wine-dark: #38121b;
        --olive: #687245;
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--ink);
        background: var(--paper);
      }
      .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
      .navbar-custom {
        background: rgba(251, 247, 239, .94);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(92, 31, 45, .12);
      }
      .navbar-brand { color: var(--wine-dark); letter-spacing: .02em; }
      .nav-link { color: var(--ink); font-weight: 700; }
      .nav-link:hover { color: var(--wine); }
      .btn-wine {
        background: var(--wine);
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: .85rem 1.25rem;
        font-weight: 700;
      }
      .btn-wine:hover { background: var(--wine-dark); color: #fff; }
      .btn-outline-wine {
        border: 1px solid rgba(92, 31, 45, .4);
        color: var(--wine);
        border-radius: 999px;
        padding: .82rem 1.25rem;
        font-weight: 700;
      }
      .btn-outline-wine:hover { background: var(--wine); color: #fff; }

      .hero {
        min-height: auto;
        padding: 4.5rem 0 0;
        display: flex;
        align-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 15% 20%, rgba(184, 138, 68, .18), transparent 28%),
          radial-gradient(circle at 85% 18%, rgba(92, 31, 45, .14), transparent 30%),
          linear-gradient(135deg, #fffaf0 0%, #f1e7d7 55%, #ede0cc 100%);
      }
      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(184, 138, 68, .09) 1px, transparent 1px),
          linear-gradient(90deg, rgba(184, 138, 68, .07) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,.6), transparent 80%);
      }
      .hero .container { position: relative; z-index: 1; }
      .eyebrow {
        color: var(--wine);
        font-weight: 800;
        letter-spacing: .16em;
        text-transform: uppercase;
        font-size: .78rem;
      }
      .hero h1 {
        font-size: clamp(2.4rem, 6vw, 4.4rem);
        line-height: .95;
        letter-spacing: -.03em;
        color: var(--wine-dark);
      }
      .hero-copy { color: var(--muted); max-width: 32rem; }
      .hero-frame {
        position: relative;
        width: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }
      .hero-art {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        object-position: center;
        border-radius: 0;
        display: block;
      }
      .caption-card {
        display: none;
      }
      section { padding: 6rem 0; }
      .section-title { color: var(--wine-dark); }
      .bg-vellum { background: var(--vellum); }
      .feature-panel {
        border-radius: 2rem;
        background: #fffaf3;
        border: 1px solid rgba(184, 138, 68, .35);
        box-shadow: 0 16px 48px rgba(34, 26, 23, .08);
      }
      .feature-panel img {
        width: 100%;
        border-radius: 1.5rem;
        object-fit: cover;
        box-shadow: 0 16px 42px rgba(34, 26, 23, .16);
      }
      .art-link {
        display: block;
        height: 100%;
        color: inherit;
        text-decoration: none;
      }
      .art-card {
        border: 1px solid rgba(184, 138, 68, .26);
        border-radius: 1.5rem;
        overflow: hidden;
        background: #fffaf3;
        box-shadow: 0 12px 34px rgba(34, 26, 23, .08);
        height: 100%;
        transition: .25s ease;
      }
      .art-card:hover { transform: translateY(-5px); box-shadow: 0 20px 48px rgba(34, 26, 23, .13); }
      .art-card img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; background: #e9ddcb; }
      .art-card .card-body { padding: 1.2rem; }
      .badge-medium {
        background: rgba(184, 138, 68, .18);
        color: var(--wine-dark);
        border-radius: 999px;
        padding: .36rem .75rem;
        font-weight: 800;
        font-size: .78rem;
      }
      .coming-soon {
        min-height: 100%;
        border: 1px dashed rgba(92, 31, 45, .32);
        border-radius: 1.5rem;
        background:
          linear-gradient(135deg, rgba(255,255,255,.72), rgba(242,234,220,.72));
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .statement-box {
        border-left: 5px solid var(--gold);
        background: #fffaf3;
        border-radius: 1.25rem;
        box-shadow: 0 12px 34px rgba(34, 26, 23, .08);
      }
      .small-muted { color: var(--muted); }
      footer { background: var(--wine-dark); color: #e9ddcb; padding: 4.5rem 0; }
      footer a { color: #fff; text-decoration: none; }
      .modal-content { border-radius: 1.5rem; overflow: hidden; border: 0; }
      .modal-image { width: 100%; height: 100%; max-height: 82vh; object-fit: contain; background: #120b0d; }
      @media (max-width: 991px) {
        .hero { padding-top: 4.75rem; }
        .hero-art { aspect-ratio: 4 / 5; }
      }
    </style>
